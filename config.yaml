# Twitter Trend Radar - Configuration
# =====================================

twitter:
  # Your Twitter API Bearer Token
  bearer_token: "${TWITTER_BEARER_TOKEN}"
  
  # Credit budget (usage-based pricing)
  monthly_credit_limit: 15000
  
  # Max tweets to fetch per priority account per scan
  max_tweets_per_user: 10

  # Rate limiting
  search_rate_limit: 280
  poll_interval_minutes: 15

# Apify (broad discovery, no Twitter API credit cost)
apify:
  api_token: "${APIFY_API_TOKEN}"
  # Max tweets per query via Apify
  max_tweets_per_query: 100

# Communities to track
# Each community has priority accounts (Twitter API) and search queries (Apify)
communities:
  ai:
    name: "AI / Machine Learning"
    enabled: true
    # Search queries — used by Apify for broad discovery (free)
    queries:
      - "AI artificial intelligence LLM GPT Claude"
      - "AGI superintelligence AI safety"
      - "OpenAI Anthropic DeepMind Google AI"
    # Priority accounts — monitored via Twitter API timelines (credit-efficient)
    priority_accounts:
      - "sama"           # Sam Altman
      - "ylecun"         # Yann LeCun
      - "AnthropicAI"    # Anthropic
      - "GoogleDeepMind" # DeepMind
      - "elonmusk"
      - "DrJimFan"       # Jim Fan
      - "swyx"           # Swyx
      - "kaborgo"        # Karpathy
      - "OpenAI"
      - "xaborgo"        # xAI
      - "emaborgo"       # Emad
    min_likes: 10
    min_retweets: 3

  crypto:
    name: "Crypto / Web3"
    enabled: true
    queries:
      - "crypto bitcoin ethereum solana"
      - "DeFi DEX onchain memecoin"
      - "airdrop token launch TGE"
    priority_accounts:
      - "VitalikButerin"
      - "blknoiz06"
      - "CryptoHayes"    # Arthur Hayes
      - "HsakaTrades"
      - "MustStopMurad"
      - "DefiIgnas"
      - "inversebrah"
      - "ZssBecker"
      - "gainzy222"
      - "jonwu_"
    min_likes: 10
    min_retweets: 3

  tech:
    name: "Tech / Startups"
    enabled: false
    queries:
      - "startup YC venture capital Series A"
      - "SaaS developer tools open source"
    priority_accounts:
      - "paulg"
      - "garrytan"
      - "levelsio"
    min_likes: 10
    min_retweets: 3

# Trend detection settings
detection:
  # Baseline window for comparison (hours)
  baseline_window_hours: 24
  # Current "trending" window (hours)
  trending_window_hours: 4
  # Minimum velocity to flag as trending
  min_velocity_score: 2.0
  # Max trends per community
  max_trends_per_community: 5
  # Dedup threshold
  dedup_similarity_threshold: 0.75

# Alert settings
alerts:
  digest_interval_minutes: 60
  # Velocity threshold for push alerts (lower = more alerts)
  alert_velocity_threshold: 3.0
  quiet_hours:
    start: 23
    end: 8
    timezone: "America/Los_Angeles"
  include_drafts: true
  drafts_per_trend: 2

# Draft generation
drafts:
  styles:
    - name: "hot_take"
      description: "Spicy, opinionated take. 1-3 tweets max."
      max_length: 800
    - name: "thread"
      description: "Informative thread breaking down the trend. 5-8 tweets."
      max_length: 2000
    - name: "article_outline"
      description: "Blog post / article outline with key points."
      max_length: 1500

# Storage
storage:
  db_path: "data/twitter_radar.db"
  retention_days: 30
