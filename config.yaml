# Twitter Trend Radar - Configuration
# =====================================

twitter:
  # Your Twitter API Bearer Token
  bearer_token: "${TWITTER_BEARER_TOKEN}"
  
  # Credit budget (usage-based pricing)
  monthly_credit_limit: 15000
  
  # Max tweets to fetch per priority account per scan
  max_tweets_per_user: 10

  # Rate limiting
  search_rate_limit: 280
  poll_interval_minutes: 15

# Apify (scrapes tweets from your following list — no Twitter API credits)
apify:
  api_token: "${APIFY_API_TOKEN}"
  # Max tweets per Apify scrape batch
  max_tweets_per_query: 200
  # How many accounts to scrape per scan (rotates through full list)
  accounts_per_scan: 50

# Scraping strategy: pull tweets from ALL accounts you follow,
# let trend detection cluster topics automatically.
# No manual categorization needed.
following:
  # Your Twitter username (used to pull following list)
  username: "zampa0x"
  # How many accounts to scrape per scan (rotates through full list)
  accounts_per_scan: 100
  # Minimum followers to include (filters out bots/dead accounts)
  min_followers: 1000
  # How often to refresh the following list (hours)
  refresh_interval_hours: 168  # weekly

# Trend detection settings
detection:
  # Baseline window for comparison (hours)
  baseline_window_hours: 24
  # Current "trending" window (hours)
  trending_window_hours: 4
  # Minimum velocity to flag as trending
  min_velocity_score: 2.0
  # Max trends per community
  max_trends_per_community: 5
  # Dedup threshold
  dedup_similarity_threshold: 0.75

# Alert settings
alerts:
  digest_interval_minutes: 60
  # Velocity threshold for push alerts (lower = more alerts)
  alert_velocity_threshold: 3.0
  quiet_hours:
    start: 23
    end: 8
    timezone: "America/Los_Angeles"
  include_drafts: true
  drafts_per_trend: 2

# Draft generation
drafts:
  styles:
    - name: "hot_take"
      description: "Spicy, opinionated take. 1-3 tweets max."
      max_length: 800
    - name: "thread"
      description: "Informative thread breaking down the trend. 5-8 tweets."
      max_length: 2000
    - name: "article_outline"
      description: "Blog post / article outline with key points."
      max_length: 1500

# Storage
storage:
  db_path: "data/twitter_radar.db"
  retention_days: 30
