# Twitter Trend Radar - Configuration
# =====================================
# Architecture:
#   1. X API timeline (your curated feed, 200 tweets every 4h)
#   2. Apify trending (broad discovery, 1-2x daily)
#   3. X API following refresh (monthly)

# OAuth 1.0a for timeline access (zampa0x user context)
twitter_oauth:
  api_key: "${TWITTER_API_KEY}"
  api_secret: "${TWITTER_API_SECRET}"
  access_token: "${TWITTER_ACCESS_TOKEN}"
  access_token_secret: "${TWITTER_ACCESS_TOKEN_SECRET}"
  user_id: "1618325246658088960"

# Bearer token for following list refresh
twitter:
  bearer_token: "${TWITTER_BEARER_TOKEN_ZAMPA0X}"

# Timeline settings
timeline:
  tweets_per_scan: 200
  scan_interval_hours: 4

# Apify (broad trending discovery)
apify:
  api_token: "${APIFY_API_TOKEN}"
  max_tweets_per_query: 100

# Trending discovery queries (used by Apify, 1-2x daily)
trending:
  queries:
    - "AI OR LLM OR ChatGPT OR OpenAI OR Anthropic min_faves:500"
    - "crypto OR bitcoin OR solana OR ethereum OR DeFi min_faves:500"
    - "prediction market OR polymarket OR kalshi min_faves:100"
  max_tweets: 100

# Trend detection
detection:
  baseline_window_hours: 24
  trending_window_hours: 4
  min_velocity_score: 1.5
  max_trends_per_community: 10
  min_cluster_size: 3

# Alerts
alerts:
  alert_velocity_threshold: 3.0
  quiet_hours:
    start: 23
    end: 8
    timezone: "America/Los_Angeles"
  include_drafts: true
  drafts_per_trend: 2

# Draft generation
drafts:
  styles:
    - name: "hot_take"
      description: "Spicy, opinionated take. 1-3 tweets max."
      max_length: 800
    - name: "thread"
      description: "Informative thread breaking down the trend. 5-8 tweets."
      max_length: 2000
    - name: "article_outline"
      description: "Blog post / article outline with key points."
      max_length: 1500

# Storage
storage:
  db_path: "data/twitter_radar.db"
  retention_days: 30
